default:
  paths: ["features/"]
  import: ["steps/steps.ts"]
  loader: ["ts-node/esm"]
  tags: "not @skip"
  retry: 2
  retryTagFilter: "@flaky-retry or @flaky-random"
  format:
    - summary
    - junit:reports/cucumber/junit.xml
    - cucumber-ctrf-json-reporter:reports/cucumber/ctrf.json
  formatOptions:
    snippetInterface: async-await
