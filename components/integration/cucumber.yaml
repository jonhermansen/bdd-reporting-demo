default:
  paths: ["features/"]
  import: ["steps/**/*.ts"]
  loader: ["ts-node/esm"]
  retry: 10
  retryTagFilter: "@flaky"
  order: "random"
  format:
    - summary
    - "junit:../../reports/integration/junit.xml"
    - "cucumber-ctrf-json-reporter:../../reports/integration/ctrf.json"
  formatOptions:
    snippetInterface: async-await
