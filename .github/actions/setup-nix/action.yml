name: Setup Nix
description: Install Nix, enable the magic cache, prewarm the flake's default shell.

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main
    - uses: DeterminateSystems/magic-nix-cache-action@b4a9864e3a8ab8179be30f2e70fd71fe9996bb9d # main
    - name: Prewarm dev shell
      shell: bash
      run: nix develop --command true
