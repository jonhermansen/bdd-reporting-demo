name: reports

on:
  push:
  schedule:
    # hourly cron builds main-branch history for CTRF trend/flakiness reports
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

jobs:
  cucumber:
    name: cucumber-js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        run: npm ci || npm install

      - name: Build cucumber-ctrf-json-reporter
        run: npm --workspace cucumber-ctrf-json-reporter run build

      - name: Run cucumber tests
        continue-on-error: true
        run: npm test

      - name: Upload CTRF + JUnit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/cucumber/
          retention-days: 30

      - name: Publish CTRF report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: reports/cucumber/ctrf.json

          # Enable the reports that get interesting over time + on failure.
          # Defaults stay off unless listed here.
          summary-report: true
          failed-report: true
          flaky-report: true
          flaky-rate-report: true          # flake rate across historical runs
          fail-rate-report: true           # fail rate across historical runs
          previous-results-report: true    # table of prior N runs
          tests-changed-report: true       # tests added / removed since last run
          slowest-report: true             # timing trend outliers
          insights-report: true            # run-level metric deltas

          # Behaviour
          pull-request: true               # post PR comment
          on-fail-only: true               # but only when something's actually red
          update-comment: true             # edit in place across the PR's life
          collapse-large-reports: true     # dense-on-green, expandable-on-red
          annotate: true                   # inline failure annotations on diffs
          upload-artifact: true            # keeps the enriched CTRF JSON per-run
          previous-results-max: 20         # history depth in the tables
