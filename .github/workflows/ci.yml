name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on feature branches; always finish main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Single-runner pipeline: build reporter → run cucumber twice (pre/post
  # migration) → render reports. Step implementations are pure synthesis
  # (jittered durations + occasional simulated failures) so this validates
  # the reporter pipeline without any real services.
  # ─────────────────────────────────────────────────────────────────────────

  pipeline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-js

      - name: Build cucumber-ctrf-json-reporter
        run: nix develop --command npm --workspace cucumber-ctrf-json-reporter run build

      # Migration-pattern reporting: run the same suite twice, once before
      # and once after a (placeholder) upgrade, so the merged report can show
      # pre/post side-by-side AND each phase gets its own history stream.
      - name: Run integration tests (pre-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: pre-upgrade
        run: nix develop --command npm run test:integration
      # Rename in its own step so cucumber's exit-1 on test failure doesn't
      # short-circuit the bash before the mv lands.
      - name: Stash pre-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.pre.json

      - name: Simulated upgrade
        run: 'echo "pretend-upgrade — would migrate schema / swap binaries here"'

      - name: Run integration tests (post-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: post-upgrade
        run: nix develop --command npm run test:integration
      - name: Stash post-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.post.json

      - name: List collected CTRF files
        if: always()
        run: find reports -type f | tee "$GITHUB_STEP_SUMMARY"

      # Migration diff: post-upgrade is the "current run", pre-upgrade is
      # the baseline. tests-changed-report and summary-delta-report compute
      # regressions/recoveries between the two. Aggregate metrics
      # (insights/slowest/fail-rate/flaky-rate/previous-results) come from
      # the action's own history fetch via GITHUB_TOKEN — the artifact it
      # uploads (ctrf-report) tracks post-upgrade across runs.
      - name: Publish migration report
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: reports/integration/ctrf.post.json
          baseline-report-path: reports/integration/ctrf.pre.json

          # Dense on green, rich on red
          summary-report: true
          summary-delta-report: true
          tests-changed-report: true
          failed-folded-report: true
          flaky-report: true
          flaky-rate-report: true
          fail-rate-report: true
          previous-results-report: true
          insights-report: true
          slowest-report: true
          skipped-report: true
          suite-folded-report: true
          file-report: true
          pull-request-report: true
          commit-report: true

          # Explicitly disabled — the action bundles AI provider clients
          # (OpenAI/Anthropic/Gemini/Bedrock/etc.) gated behind these flags.
          # We never want test data POSTed to a third party.
          ai-report: false
          ai-summary-report: false

          summary: true
          pull-request: true
          on-fail-only: true          # PR comment only when something's red
          update-comment: true
          collapse-large-reports: true
          annotate: true
          use-suite-name: true
          upload-artifact: true
          previous-results-max: 20
          group-by: suite
          exit-on-fail: false
