name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on feature branches; always finish main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Fast gate: syntax/format/audit. Fails in seconds and kills the pipe early.
  # ─────────────────────────────────────────────────────────────────────────

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-js
      - name: npm audit (fail on high)
        run: nix develop --command npm audit --audit-level=high --workspaces --include-workspace-root

  # ─────────────────────────────────────────────────────────────────────────
  # Security scans: run in parallel with builds.
  # ─────────────────────────────────────────────────────────────────────────

  dep-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  codeql:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript,actions
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  # ─────────────────────────────────────────────────────────────────────────
  # Component jobs: each self-contained; fans out in parallel.
  # Naming = component name, not activity. Internal phases: build, test, report.
  # ─────────────────────────────────────────────────────────────────────────

  reporter:
    needs: lint
    runs-on: ubuntu-24.04
    outputs:
      # marker so downstream jobs can depend on this being built
      built: "yes"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-js
      - name: Build cucumber-ctrf-json-reporter
        run: nix develop --command npm --workspace cucumber-ctrf-json-reporter run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reporter-dist
          path: packages/cucumber-ctrf-json-reporter/dist/

  backend:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-scala
      - name: Compile
        working-directory: components/backend
        run: nix develop ../.. --command sbt compile
      - name: Test
        working-directory: components/backend
        continue-on-error: true
        run: nix develop ../.. --command sbt test
      - name: Convert JUnit to CTRF
        working-directory: components/backend
        run: nix develop ../.. --command npx --yes junit-to-ctrf 'reports/junit/*.xml' -o ../../reports/backend/ctrf.json --tool scalatest
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ctrf-backend
          path: reports/backend/ctrf.json
          if-no-files-found: warn

  ui:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-js
      - name: Build
        working-directory: components/ui
        run: nix develop ../.. --command npm run build
      - name: Test
        continue-on-error: true
        run: nix develop --command npm run test:ui
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ctrf-ui
          path: reports/ui/ctrf.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Integration: spins up stack via docker-compose + runs the backend directly.
  # Drives the UI (built earlier) via playwright through cucumber-js.
  # ─────────────────────────────────────────────────────────────────────────

  integration:
    needs: [backend, ui, reporter]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: ./.github/actions/setup-js
      - uses: ./.github/actions/setup-scala
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: reporter-dist
          path: packages/cucumber-ctrf-json-reporter/dist/
      - name: Start postgres
        run: docker compose up -d postgres --wait
      - name: Start backend
        working-directory: components/backend
        run: |
          nix develop ../.. --command sbt "runMain demo.Server" &
          nix develop ../.. --command npx --yes wait-on http://localhost:8080/health --timeout 60000
      - name: Start UI
        working-directory: components/ui
        run: |
          nix develop ../.. --command npm run preview &
          nix develop ../.. --command npx --yes wait-on http://localhost:5173 --timeout 30000
      # Migration-pattern reporting: run the same suite twice, once before
      # and once after a (placeholder) upgrade, so the merged report can show
      # pre/post side-by-side AND each phase gets its own history stream.
      - name: Run integration tests (pre-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: pre-upgrade
        run: nix develop --command npm run test:integration
      # Rename in its own step so cucumber's exit-1 on test failure doesn't
      # short-circuit the bash before the mv lands.
      - name: Stash pre-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.pre.json
      - name: Simulated upgrade
        run: echo "pretend-upgrade: would migrate schema / swap binaries here"
      - name: Run integration tests (post-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: post-upgrade
        run: nix develop --command npm run test:integration
      - name: Stash post-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.post.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ctrf-integration
          path: reports/integration/ctrf.*.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Aggregator: one final report. Merges every component's CTRF JSON.
  # This is the single required status check you gate PRs on.
  # ─────────────────────────────────────────────────────────────────────────

  report:
    needs: [backend, ui, integration]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ctrf-*
          path: ctrf
      - name: List collected CTRF files
        run: |
          mkdir -p ctrf
          find ctrf -type f | tee "$GITHUB_STEP_SUMMARY"
      - name: Publish merged CTRF report
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # ctrf*.json picks up backend/ui ctrf.json plus integration's
          # ctrf.pre.json + ctrf.post.json from the migration pattern.
          report-path: ctrf/**/ctrf*.json

          # Dense on green, rich on red
          summary-report: true
          failed-folded-report: true
          flaky-report: true
          flaky-rate-report: true
          fail-rate-report: true
          previous-results-report: true
          insights-report: true
          slowest-report: true
          tests-changed-report: true
          skipped-report: true
          suite-folded-report: true
          file-report: true
          pull-request-report: true
          commit-report: true

          # Explicitly disabled — the action bundles AI provider clients
          # (OpenAI/Anthropic/Gemini/Bedrock/etc.) gated behind these flags.
          # We never want test data POSTed to a third party.
          ai-report: false
          ai-summary-report: false

          summary: true
          pull-request: true
          on-fail-only: true          # PR comment only when something's red
          update-comment: true
          collapse-large-reports: true
          annotate: true
          use-suite-name: true
          upload-artifact: true
          previous-results-max: 20
          group-by: suite
          exit-on-fail: false         # don't fail aggregator; component jobs own pass/fail

      # ─────────────────────────────────────────────────────────────────
      # Per-phase history streams: identical action, distinct artifact-name
      # so each phase accumulates its own multi-run trend (Insights p95,
      # flaky rate, fail rate). Lets us spot regressions that only appear
      # post-upgrade. Each invocation has its own upload artifact bucket.
      # ─────────────────────────────────────────────────────────────────
      - name: Pre-upgrade history stream
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: ctrf/**/ctrf.pre.json
          artifact-name: ctrf-report-pre
          summary-report: true
          insights-report: true
          previous-results-report: true
          slowest-report: true
          flaky-rate-report: true
          fail-rate-report: true
          ai-report: false
          ai-summary-report: false
          summary: true
          pull-request: false
          annotate: false
          upload-artifact: true
          previous-results-max: 20
          exit-on-fail: false

      - name: Post-upgrade history stream
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: ctrf/**/ctrf.post.json
          artifact-name: ctrf-report-post
          summary-report: true
          insights-report: true
          previous-results-report: true
          slowest-report: true
          flaky-rate-report: true
          fail-rate-report: true
          ai-report: false
          ai-summary-report: false
          summary: true
          pull-request: false
          annotate: false
          upload-artifact: true
          previous-results-max: 20
          exit-on-fail: false
