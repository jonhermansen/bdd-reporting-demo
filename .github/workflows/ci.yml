name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on feature branches; always finish main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Single-runner pipeline: build reporter → run cucumber twice (pre/post
  # migration) → render reports. Step implementations are pure synthesis
  # (jittered durations + occasional simulated failures) so this validates
  # the reporter pipeline without any real services.
  # ─────────────────────────────────────────────────────────────────────────

  pipeline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # npm ci runs the reporter's prepare script (tsc) as part of the
      # workspace install, so dist/ is built before tests run.
      - name: Install workspace
        run: npm ci

      # Migration-pattern reporting: run the same suite twice, once before
      # and once after a (placeholder) upgrade. Step implementations gate on
      # CTRF_SUITE so regression/recovery scenarios fail in the right phase.
      - name: Run integration tests (pre-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: pre-upgrade
          CTRF_FILE_PATH_PREFIX: components/integration
        run: npm run test:integration
      # Rename in its own step so cucumber's exit-1 on test failure doesn't
      # short-circuit the bash before the mv lands.
      - name: Stash pre-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.pre.json

      - name: Simulated upgrade
        run: 'echo "pretend-upgrade — would migrate schema / swap binaries here"'

      - name: Run integration tests (post-upgrade)
        continue-on-error: true
        env:
          CTRF_SUITE: post-upgrade
          CTRF_FILE_PATH_PREFIX: components/integration
        run: npm run test:integration
      - name: Stash post-upgrade CTRF
        if: always()
        run: mv reports/integration/ctrf.json reports/integration/ctrf.post.json

      # ── Migration diff: custom action with explicit Pre/Post/Δ table
      # plus regressed/recovered detail. Replaces the ctrf-io plugin's
      # summary-delta-report (which has the wrong rendering shape and
      # bugs around baseline-report-path). Writes directly to
      # GITHUB_STEP_SUMMARY at the top.
      - name: Migration diff
        if: always()
        uses: ./.github/actions/migration-report
        with:
          pre-report: reports/integration/ctrf.pre.json
          post-report: reports/integration/ctrf.post.json

      # ── Drilldown: per-feature, per-scenario, per-step status + timing
      # rendered as nested <details>. Shows the full BDD trace with
      # file:line links to .feature and step-definition source. One
      # drilldown per phase.
      - name: Drilldown — pre-upgrade
        if: always()
        uses: ./.github/actions/drilldown-report
        with:
          report: reports/integration/ctrf.pre.json
          title: '🔍 Pre-upgrade drilldown'

      - name: Drilldown — post-upgrade
        if: always()
        uses: ./.github/actions/drilldown-report
        with:
          report: reports/integration/ctrf.post.json
          title: '🔍 Post-upgrade drilldown'

      # The two ctrf-io invocations below cover what the plugin is good
      # at: per-phase trend reports across that phase's history. Each
      # uses a distinct artifact-name so its history fetch walks only
      # its own phase's prior artifacts. Their summaries are captured
      # via outputs.summary and wrapped in collapsed <details> blocks
      # below.

      # ── Lens 1: pre-upgrade trends across pre runs ─────────────────────
      - id: pre-trend
        name: Pre-upgrade trend
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: reports/integration/ctrf.pre.json
          artifact-name: ctrf-report-pre
          summary-report: true
          insights-report: true
          slowest-report: true
          fail-rate-report: true
          flaky-rate-report: true
          ai-report: false
          ai-summary-report: false
          summary: false                   # capture via outputs.summary
          pull-request: false
          annotate: false
          use-suite-name: true
          upload-artifact: true
          group-by: suite
          exit-on-fail: false

      # ── Lens 2: post-upgrade trends across post runs ───────────────────
      - id: post-trend
        name: Post-upgrade trend
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: reports/integration/ctrf.post.json
          artifact-name: ctrf-report-post
          summary-report: true
          insights-report: true
          slowest-report: true
          fail-rate-report: true
          flaky-rate-report: true
          ai-report: false
          ai-summary-report: false
          summary: false
          pull-request: false
          annotate: false
          use-suite-name: true
          upload-artifact: true
          group-by: suite
          exit-on-fail: false

      # ── Compose: migration diff already written; append trends below ───
      - name: Append trend sections
        if: always()
        env:
          PRE_SUMMARY: ${{ steps.pre-trend.outputs.summary }}
          POST_SUMMARY: ${{ steps.post-trend.outputs.summary }}
        run: |
          {
            echo '<details><summary>📈 <b>Pre-upgrade trend</b> — across past pre runs</summary>'
            echo
            printf '%s\n' "$PRE_SUMMARY"
            echo
            echo '</details>'
            echo
            echo '<details><summary>📈 <b>Post-upgrade trend</b> — across past post runs</summary>'
            echo
            printf '%s\n' "$POST_SUMMARY"
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
